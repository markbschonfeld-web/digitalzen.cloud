# Cloudflare Workers — Digital Zen
# Deploy with: wrangler deploy <worker-file>
# Docs: https://developers.cloudflare.com/workers/wrangler/

# ─── Email capture → Shopify ───────────────────────────────────────────────
# Deployed at: https://dz-subscribe.helixirin.workers.dev
#
# Deploy:
#   cd worker
#   wrangler deploy shopify-subscribe.js --name dz-subscribe --compatibility-date 2024-01-01
#
# Required secrets (set once via Cloudflare dashboard or wrangler secret put):
#   wrangler secret put SHOPIFY_CLIENT_ID   --name dz-subscribe
#   wrangler secret put SHOPIFY_CLIENT_SECRET --name dz-subscribe
#   wrangler secret put SHOPIFY_STORE       --name dz-subscribe
#     → SHOPIFY_STORE value = "helixirin" (just the store handle, no .myshopify.com)
#
# To verify secrets are set:
#   Go to Cloudflare Dashboard → Workers & Pages → dz-subscribe
#   → Settings → Variables and Secrets
#   All three should appear (values are encrypted, not visible)
#
# To check logs (live):
#   wrangler tail --name dz-subscribe
#
# To test locally:
#   wrangler dev shopify-subscribe.js --name dz-subscribe
#   curl -X POST http://localhost:8787 \
#     -H "Content-Type: application/json" \
#     -d '{"email":"test@example.com","archetype":"architect"}'

[dz-subscribe]
name = "dz-subscribe"
main = "shopify-subscribe.js"
compatibility_date = "2024-01-01"

# ─── OG meta tag rewriter + Stats API ─────────────────────────────────────
# Deployed at: dz-og-rewrite.helixirin.workers.dev
# Route:       digitalzen.cloud/* → dz-og-rewrite
#
# This worker handles two responsibilities:
#   1. OG meta tag rewriting for social crawlers (GET /?r=<archetype>)
#   2. Stats API for live share counting and archetype frequency tracking
#      POST /api/share            → increment share counter
#      POST /api/result?archetype → increment completion count
#      GET  /api/stats            → return JSON with all stats + blended percentages
#
# ── KV Setup (one-time, run before deploying) ──────────────────────────────
# Step 1: Create the KV namespaces
#   wrangler kv:namespace create DZ_STATS
#   wrangler kv:namespace create DZ_STATS --preview
#
# Step 2: Copy the namespace IDs from the output above into this file:
#   Replace <namespace-id> and <preview-namespace-id> below.
#
# Step 3: Deploy
#   wrangler deploy og-rewrite.js --name dz-og-rewrite --compatibility-date 2024-01-01
#
# Step 4: Add route in Cloudflare Dashboard:
#   Workers Routes → digitalzen.cloud/* → dz-og-rewrite
#   (Requires DNS proxied through Cloudflare orange cloud)
#
# To verify KV is working:
#   curl -X POST https://dz-og-rewrite.helixirin.workers.dev/api/result?archetype=architect
#   curl https://dz-og-rewrite.helixirin.workers.dev/api/stats
#
# To watch logs:
#   wrangler tail --name dz-og-rewrite

[dz-og-rewrite]
name = "dz-og-rewrite"
main = "og-rewrite.js"
compatibility_date = "2024-01-01"

[[dz-og-rewrite.kv_namespaces]]
binding = "DZ_STATS"
id = "<namespace-id>"
preview_id = "<preview-namespace-id>"
